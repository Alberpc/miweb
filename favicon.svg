<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a8b2ff"/>
    </linearGradient>
  </defs>
  <!-- Dark background to make it visible on both dark and light browser tabs -->
  <rect width="64" height="64" rx="16" fill="#0a0908" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2"/>
  
  <!-- Subtle cobalt blue glow in the background -->
  <circle cx="32" cy="32" r="22" fill="#3b5eff" opacity="0.25"/>
  
  <!-- The AC logo text -->
  <text x="50%" y="60%" font-family="'Inter', -apple-system, sans-serif" font-weight="900" font-size="28" fill="url(#logo-grad)" text-anchor="middle" letter-spacing="-2">AC</text>
</svg>
